name: "Terraform Validate, Plan, Apply and destroy"
env:
  TF_CLI_ARGS: "-no-color"
  TF_CLI_ARGS_plan: "-input=false"
  TF_CLI_ARGS_destroy: "-input=false"
  TF_CLI_ARGS_apply: "-input=false"
on:
  workflow_call:
    inputs:
      environment:
        description: Environment to target
        type: string
        required: true
      terraform-version:
        description: Terraform version to install
        type: string
        default : "1.5.2"
      terraform-plan:
        description: Run terraform plan
        type: boolean
        default: false
      terraform-apply:
        description: Run terraform apply 
        type: boolean
        default: false
      terraform-destroy:
        description: Run terraform destroy
        type: boolean
        default: false
      terraform-working-directory:
        description: Terraform working directory
        type: string
        default: "."
      terraform-backend-config-path:
        description: Optional terraform backend config
        type: string
        default: null
      terraform-vars:
        description: Optional terraform variables to pass in the format -var='key=value' -var='key2=value2'
        type: string
        default: null
      return-tf-plan-output:
        description: Whether to return the output of terraform plan/apply/destroy commands in the workflow output. Be cautious when enabling this as it may contain sensitive information.
        type: boolean
        default: false
    secrets:
      ARM_CLIENT_ID:
        description: Azure Client ID for authentication
        required: true
      ARM_TENANT_ID:
        description: Azure Tenant ID for authentication
        required: true
      ARM_SUBSCRIPTION_ID:
        description: Azure Subscription ID for authentication
        required: true
      ARM_CLIENT_SECRET:
        description: Azure Client Secret for authentication
        required: true

jobs:
  validate:
    name: Terraform Validate
    runs-on: [ubuntu-latest]
    environment: ${{ inputs.environment }}
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
    steps:
      - name: "Checkout Source Code"
        uses: actions/checkout@v5

      - name: "Install Terraform"
        uses:  hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform-version }}

      - name: Terraform Init
        working-directory: ${{ inputs.terraform-working-directory }}
        run: |
          {
            echo "### Terraform Init"
            echo "<details><summary>Terraform Init</summary>"
            echo
            echo \`\`\`
            if [ -n "${{ inputs.terraform-backend-config-path }}" ]; then
              terraform init -backend-config=${{ inputs.terraform-backend-config-path }}
            else
              terraform init
            fi
            echo \`\`\`
            echo "</details>"
            echo
          } >> $GITHUB_STEP_SUMMARY

      - name: Terraform Validate
        working-directory: ${{ inputs.terraform-working-directory }}
        run: |
          {
            echo "### Terraform Validate"
            echo "<details><summary>Terraform Validate</summary>"
            echo
            echo \`\`\`
            terraform validate
            echo \`\`\`
            echo "</details>"
            echo
          } >> $GITHUB_STEP_SUMMARY
           
  plan-destroy:
    name: Terraform Plan or Destroy
    if: inputs.terraform-plan == true || inputs.terraform-destroy == true
    needs: validate
    runs-on: [ubuntu-latest]
    environment: ${{ inputs.environment }}
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
    steps:
      - name: "Checkout Source Code"
        uses: actions/checkout@v5

      - name: "Install Terraform"
        uses:  hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform-version }}

      - name: Terraform Init
        working-directory: ${{ inputs.terraform-working-directory }}
        run: |
          {
            echo "### Terraform Init"
            echo "<details><summary>Terraform Init</summary>"
            echo
            echo \`\`\`
            if [ -n "${{ inputs.terraform-backend-config-path }}" ]; then
              terraform init -backend-config=${{ inputs.terraform-backend-config-path }}
            else
              terraform init
            fi
            echo \`\`\`
            echo "</details>"
            echo
          } >> $GITHUB_STEP_SUMMARY

      - name: Terraform Plan
        if: inputs.terraform-plan == true
        working-directory: ${{ inputs.terraform-working-directory }}
        run: |
          {
            echo "### Terraform Plan"
            echo "<details><summary>Terraform Plan</summary>"
            echo
            echo \`\`\`
            if [ -n "${{ inputs.terraform-vars }}" ]; then
              eval "terraform plan ${{ inputs.terraform-vars }} -out tfplan"
            else
              terraform plan -out tfplan
            fi
            echo \`\`\`
            echo "</details>"
            echo
          } >> $GITHUB_STEP_SUMMARY

      - name: Terraform Destroy
        if: inputs.terraform-destroy == true
        working-directory: ${{ inputs.terraform-working-directory }}
        run: |
          {
            echo "### Terraform Destroy"
            echo "<details><summary>Terraform Destroy</summary>"
            echo
            echo \`\`\`
            if [ -n "${{ inputs.terraform-vars }}" ]; then
              eval "terraform plan -destroy ${{ inputs.terraform-vars }} -out tfplan"
            else
              terraform plan -destroy -out tfplan
            fi
            echo \`\`\`
            echo "</details>"
            echo
          } >> $GITHUB_STEP_SUMMARY

      - name: Upload tfplan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path : ${{ inputs.terraform-working-directory }}/tfplan
          retention-days: 1
          if-no-files-found: error

  apply:
    name: Terraform Apply
    if: inputs.terraform-apply == true && (inputs.terraform-plan == true || inputs.terraform-destroy == true)
    needs: plan-destroy
    runs-on: [ubuntu-latest]
    environment: ${{ inputs.environment }}
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
    steps:
      - name: "Checkout Source Code"
        uses: actions/checkout@v5

      - name: "Install Terraform"
        uses:  hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform-version }}

      - name: Terraform Init
        working-directory: ${{ inputs.terraform-working-directory }}
        run: |
          {
            echo "### Terraform Init"
            echo "<details><summary>Terraform Init</summary>"
            echo
            echo \`\`\`
            if [ -n "${{ inputs.terraform-backend-config-path }}" ]; then
              terraform init -backend-config=${{ inputs.terraform-backend-config-path }}
            else
              terraform init
            fi
            echo \`\`\`
            echo "</details>"
            echo
          } >> $GITHUB_STEP_SUMMARY

      - name: Download tfplan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ inputs.terraform-working-directory }}/tfplan

      - name: Terraform Apply
        working-directory: ${{ inputs.terraform-working-directory }}
        run: |
          {
            echo "### Terraform Apply"
            echo "<details><summary>Terraform Apply</summary>"
            echo
            echo \`\`\`
            terraform apply tfplan
            echo \`\`\`
            echo "</details>"
            echo
          } >> $GITHUB_STEP_SUMMARY

      - name: Return Terraform Apply output
        if: inputs.return-tf-plan-output == true
        run: |
          echo "terraform_output<<EOF" >> $GITHUB_OUTPUT
          terraform output -json
          echo "EOF" >> $GITHUB_OUTPUT
