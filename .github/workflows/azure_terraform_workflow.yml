name: "Terraform Validate, Plan, Apply and destroy"
env:
  TF_CLI_ARGS: "-no-color"
  TF_CLI_ARGS_plan: "-input=false"
  TF_CLI_ARGS_destroy: "-input=false"
  TF_CLI_ARGS_apply: "-input=false"
on:
  workflow_call:
    inputs:
      product:
        description: Product to target, used for informational purposes in this workflow
        type: string
        required: true
      environment:
        description: Environment to target
        type: string
        required: true
      storage_account_name:
        description: Azure Storage Account name to pull secrets from, if pull_secrets is set to true. The storage account must have a container named 'terraform-secrets' with secrets stored in the format <working-directory>/secrets.tfvars
        type: string
        required: true
      terraform-version:
        description: Terraform version to install
        type: string
        default : "1.5.2"
      terraform-plan:
        description: Run terraform plan
        type: boolean
        default: false
      terraform-apply:
        description: Run terraform apply 
        type: boolean
        default: false
      terraform-destroy:
        description: Run terraform destroy
        type: boolean
        default: false
      terraform-working-directory:
        description: Terraform working directory
        type: string
        default: "."
      return-tf-plan-output:
        description: Whether to return the output of terraform plan/apply/destroy commands in the workflow output. Be cautious when enabling this as it may contain sensitive information.
        type: boolean
        default: false
      pull_secrets:
        description: Whether to pull secrets files from Azure Storage Account. The storage account and path are fixed.
        type: boolean
        default: false
    secrets:
      AZURE_CREDENTIALS:
        description: Azure Service Principal credentials as in accepted by azure/login action
        required: true
      ARM_CLIENT_ID:
        description: Azure Service Principal Client ID.
        required: true
      ARM_TENANT_ID:
        description: Azure Service Principal Tenant ID.
        required: true
      ARM_SUBSCRIPTION_ID:
        description: Azure Service Principal Subscription ID.
        required: true
      ARM_CLIENT_SECRET:
        description: Azure Service Principal Client Secret.
        required: true
    outputs:
      terraform_output:
        description: Output from terraform plan/apply/destroy commands, returned as JSON string. Will be empty if return-tf-plan-output input is set to false.
        value: ${{ jobs.apply.outputs.terraform_output }}
jobs:
  validate:
    name: Terraform Validate
    runs-on: [ubuntu-latest]
    environment: ${{ inputs.environment }}
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
    steps:
      - name: "Azure Terraform Init"
        uses: nicolas-furtadods/all-repos-tooling-private/.github/actions/azure-terraform-init@${{github.ref}}
        with:
          terraform-working-directory: ${{ inputs.terraform-working-directory }}
          terraform-version: ${{ inputs.terraform-version }}
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}

      - name: Terraform Validate
        working-directory: ${{ inputs.terraform-working-directory }}
        run: |
          {
            echo "### Terraform Validate"
            echo "<details><summary>Terraform Validate</summary>"
            echo
            echo \`\`\`
            terraform validate
            echo \`\`\`
            echo "</details>"
            echo
          } >> $GITHUB_STEP_SUMMARY
           
  plan-destroy:
    name: Terraform Plan or Destroy
    if: inputs.terraform-plan == true || inputs.terraform-destroy == true
    needs: validate
    runs-on: [ubuntu-latest]
    environment: ${{ inputs.environment }}
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
    steps:
      ## DO NOT FORGET FOR NEXT TIME 
      ## USE COMPOSITE WORKFLOW STEP TO AVOID DUPLICATING CODE BETWEEN WORKFLOWS
      - name: "Checkout Source Code"
        uses: actions/checkout@v5

      - name: "Install Terraform"
        uses:  hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform-version }}

      - name: Authenticate to Azure
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Pull secrets from Azure Storage Account
        working-directory: ${{ inputs.terraform-working-directory }}
        if: inputs.pull_secrets == true
        run: |
          az storage blob download --account-name ${{ inputs.storage_account_name }} --container-name terraform-secrets --name ${{ inputs.product}}/secrets.tfvars --file secrets.tfvars --auth-mode login

      - name: Terraform Init
        working-directory: ${{ inputs.terraform-working-directory }}
        run: |
          {
            echo "### Terraform Init"
            echo "<details><summary>Terraform Init</summary>"
            echo
            echo \`\`\`
            terraform init -backend-config=backend.conf --reconfigure
            echo \`\`\`
            echo "</details>"
            echo
          } >> $GITHUB_STEP_SUMMARY
      ## DO NOT FORGET FOR NEXT TIME 
      ## USE COMPOSITE WORKFLOW STEP TO AVOID DUPLICATING CODE BETWEEN WORKFLOWS
      - name: Terraform Plan
        if: inputs.terraform-plan == true
        working-directory: ${{ inputs.terraform-working-directory }}
        run: |
          {
            echo "### Terraform Plan"
            echo "<details><summary>Terraform Plan</summary>"
            echo
            echo \`\`\`
            if [ -f "secrets.tfvars" ]; then
              terraform plan -var-file=secrets.tfvars -out tfplan
            else
              terraform plan -out tfplan
            fi
            echo \`\`\`
            echo "</details>"
            echo
          } >> $GITHUB_STEP_SUMMARY

      - name: Terraform Destroy
        if: inputs.terraform-destroy == true
        working-directory: ${{ inputs.terraform-working-directory }}
        run: |
          {
            echo "### Terraform Destroy"
            echo "<details><summary>Terraform Destroy</summary>"
            echo
            echo \`\`\`
            if [ -f "secrets.tfvars" ]; then
              terraform destroy -var-file=secrets.tfvars -out tfplan
            else
              terraform destroy -out tfplan
            fi
            echo \`\`\`
            echo "</details>"
            echo
          } >> $GITHUB_STEP_SUMMARY

      - name: Upload tfplan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path : ${{ inputs.terraform-working-directory }}/tfplan
          retention-days: 1
          if-no-files-found: error

  apply:
    name: Terraform Apply
    if: inputs.terraform-apply == true && (inputs.terraform-plan == true || inputs.terraform-destroy == true)
    needs: plan-destroy
    runs-on: [ubuntu-latest]
    environment: ${{ inputs.environment }}
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
    outputs:
      terraform_output: ${{ steps.return_terraform_output.outputs.terraform_output }}
    steps:
            ## DO NOT FORGET FOR NEXT TIME 
      ## USE COMPOSITE WORKFLOW STEP TO AVOID DUPLICATING CODE BETWEEN WORKFLOWS
      - name: "Checkout Source Code"
        uses: actions/checkout@v5

      - name: "Install Terraform"
        uses:  hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform-version }}

      - name: Authenticate to Azure
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
     
      - name: Pull secrets from Azure Storage Account
        working-directory: ${{ inputs.terraform-working-directory }}
        if: inputs.pull_secrets == true
        run: |
          az storage blob download --account-name ${{ inputs.storage_account_name }} --container-name terraform-secrets --name ${{ inputs.product}}/secrets.tfvars --file secrets.tfvars --auth-mode login

      - name: Terraform Init
        working-directory: ${{ inputs.terraform-working-directory }}
        run: |
          {
            echo "### Terraform Init"
            echo "<details><summary>Terraform Init</summary>"
            echo
            echo \`\`\`
            terraform init -backend-config=backend.conf --reconfigure
            echo \`\`\`
            echo "</details>"
            echo
          } >> $GITHUB_STEP_SUMMARY
      ## DO NOT FORGET FOR NEXT TIME 
      ## USE COMPOSITE WORKFLOW STEP TO AVOID DUPLICATING CODE BETWEEN WORKFLOWS
      - name: Download tfplan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ inputs.terraform-working-directory }}

      - name: Terraform Apply
        working-directory: ${{ inputs.terraform-working-directory }}
        run: |
          {
            echo "### Terraform Apply"
            echo "<details><summary>Terraform Apply</summary>"
            echo
            echo \`\`\`
            terraform apply tfplan
            echo \`\`\`
            echo "</details>"
            echo
          } >> $GITHUB_STEP_SUMMARY

      - name: Return Terraform Apply output
        id: return_terraform_output
        working-directory: ${{ inputs.terraform-working-directory }}
        if: inputs.return-tf-plan-output == true
        run: |
          echo "terraform_output<<EOF" >> $GITHUB_OUTPUT
          terraform output -json
          echo "EOF" >> $GITHUB_OUTPUT
