name: "Validate Python Code"
# This workflow is designed to validate Python code using pytest and ruff.

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version to install
        type: string
        default: "3.10"
      working-directory:
        description: Directory to run the checks in
        type: string
        default: "src"

jobs:
  python-code-check:
    runs-on: ubuntu-latest
    environment: all-automation
    steps:
      # Checkout the code
      - name: "Checkout Source Code"
        uses: actions/checkout@v5
      
      # Set up Python
      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      # Install dependencies
      - name: "Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff httpx

      # Install Application dependencies if requirements.txt exists
      - name: "Install application dependencies"
        run: |
          if [ -f "${{ inputs.working-directory }}/requirements.txt" ]; then
            pip install -r ${{ inputs.working-directory }}/requirements.txt
          else
            echo "No requirements.txt found in ${{ inputs.working-directory }}, skipping application dependencies installation."
          fi

      # Validate Python code with ruff
      - name: "Validate Python code with ruff"
        run: |
          ruff check ${{ inputs.working-directory }} > ruff_output.txt 2>&1 || echo "RUFF_FAILED=true" >> $GITHUB_ENV
          cat ruff_output.txt
        continue-on-error: true # Necessary to capture the output even if ruff finds issues

      # Run pytest for testing
      - name: Run Application Tests
        run: |
          pytest -v ${{ inputs.working-directory }} > pytest_output.txt 2>&1 || echo "PYTEST_FAILED=true" >> $GITHUB_ENV
          cat pytest_output.txt
        continue-on-error: true # Necessary to capture the output even if pytest finds issues

      # Format Comment 
      - name: Format Check Output
        if: env.RUFF_FAILED == 'true' || env.PYTEST_FAILED == 'true'
        id: format-checks
        run: |
          COMMENT="## :x: Python code checks found issues\n\n"

          if [ "$RUFF_FAILED" == 'true' ]; then
            COMMENT+="### Ruff Linting Issues:\n\`\`\`plaintext\n$(cat ruff_output.txt)\n\`\`\`\n\n"
          fi

          if [ "$PYTEST_FAILED" == 'true' ]; then
            COMMENT+="### Pytest Testing Issues:\n\`\`\`plaintext\n$(cat pytest_output.txt)\n\`\`\`\n\n"
          fi

          COMMENT+="Please review the issues above and fix them to ensure code quality and passing tests."
          
          echo "comment<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post comment to Summary
        if: env.RUFF_FAILED == 'true' || env.PYTEST_FAILED == 'true'
        run: echo "${{ steps.format-checks.outputs.comment }}" >> $GITHUB_STEP_SUMMARY

      - name: Post comment to Pull Request
        if: env.RUFF_FAILED == 'true' || env.PYTEST_FAILED == 'true'
        uses: actions/github-script@v6
        env:
          body_content: ${{ steps.format-checks.outputs.comment }}
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: process.env.body_content
            })

      # Fail workflow if checks failed
      - name: Fail if Python code checks found issues
        if: env.RUFF_FAILED == 'true' || env.PYTEST_FAILED == 'true'
        run: exit 1

